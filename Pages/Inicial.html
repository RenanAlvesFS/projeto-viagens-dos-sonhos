<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viagens dos Sonhos</title>
</head>
<style>
  body {
    background-image: url("./img/Fundoinicial.jpg");
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f0f0f0;
  }

  .topo h1 {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    margin: 40px 0;
    text-transform: uppercase;
    letter-spacing: 4px;
    border-bottom: 3px solid #2563eb;
    padding-bottom: 10px;
    text-align: center;
  }

  main img {
    width: 30%;
    height: auto;
    margin: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  }

  .container-paises {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1200px;
    margin: 50px auto;
  }

  .card-pais {
    position: relative;
    flex: 1;
    max-width: 350px;
    height: 450px;
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  }

  .card-pais .foto-fundo {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
    color: white;
    font-family: sans-serif;
    font-weight: bold;
  }

  .bandeira {
    width: 45px !important;
    height: auto !important;

    width: 50px !important;
    height: auto !important;
  }

  .card-pais:hover {
    transform: translateY(-10px);
  }


  .botao-imagem {
    position: relative;
    display: block;
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    /* Garante que o link ocupe todo o espaço da coluna */
    width: 100%;
  }

  .botao-imagem img {
    width: 100%;
    height: 300px;
    /* ALTURA FIXA: essencial para ficarem alinhados lado a lado */
    object-fit: cover;
    /* Corta a imagem sem esticar para preencher o tamanho acima */
    display: block;
  }

  .capa-botao {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
    color: white;
    font-family: Arial;
    font-weight: bold;
  }

  .bandeira-mini {
    width: 40px !important;
    /* Tamanho pequeno para a bandeira interna */
    height: auto !important;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
  }
</style>




<body>
  <header class="topo">
    <h1>Viagens dos Sonhos</h1>
  </header>
  <main>
    <div class="grade-fotos">
      <a href="Rui.html" class="botao-imagem">
        <img src="../Images/Japao_image_2.jpg" alt="Japão">
        <div class="capa-botao">
          <img src="https://images.emojiterra.com/google/noto-emoji/unicode-17.0/color/svg/1f1ef-1f1f5.svg"
            alt="Bandeira Japão" class="bandeira-mini">
          <span>JAPÃO</span>
        </div>
        <div class="grade-fotos">
          <a href="Renan.html" class="botao-imagem">
            <img src="./img/Suiçavila.jpg" alt="Suiça">
            <div class="capa-botao">
              <img src="https://flagcdn.com/w40/ch.png" alt="Bandeira Suiça" class="bandeira-mini">
              <span>SUIÇA</span>
            </div>
          </a>
          <a href="Renan.html" class="botao-imagem">
            <img src="./img/Sanpeters.jpg" alt="Rússia">
            <div class="capa-botao">
              <img src="https://flagcdn.com/w40/ru.png" alt="Bandeira Rússia" class="bandeira-mini">
              <span>RÚSSIA</span>
            </div>
          </a>



        </div>
</body>

</html>
